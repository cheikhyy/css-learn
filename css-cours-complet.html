<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apprends le CSS — Cours Complet Pas à Pas</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Outfit:wght@300;400;500;600;800&display=swap" rel="stylesheet">
<style>
/* ===================================================
   VARIABLES & RESET
=================================================== */
:root {
  --bg:        #0e1117;
  --surface:   #161b27;
  --card:      #1d2333;
  --border:    #2c3450;
  --accent:    #6c8ff5;
  --green:     #4cd6a0;
  --orange:    #f5a623;
  --pink:      #e86cad;
  --yellow:    #f5d45c;
  --text:      #dde4f8;
  --muted:     #6b7799;
  --code-bg:   #090c13;
  --html-col:  #e36c4e;
  --css-col:   #6c8ff5;
  --prop-col:  #79c0ff;
  --val-col:   #a5d6a7;
  --sel-col:   #e86cad;
  --comment:   #455275;
  --tag-col:   #e36c4e;
  --attr-col:  #f5a623;
  --str-col:   #4cd6a0;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
}

/* ===================================================
   SCROLLBAR
=================================================== */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

/* ===================================================
   HEADER
=================================================== */
.site-header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 2rem;
  position: sticky;
  top: 0;
  z-index: 200;
}
.header-inner {
  max-width: 1400px;
  margin: 0 auto;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.logo-text {
  font-family: 'JetBrains Mono', monospace;
  font-size: 1rem;
  font-weight: 700;
  color: var(--accent);
}
.logo-text span { color: var(--green); }
.header-steps {
  display: flex;
  gap: 6px;
  align-items: center;
}
.step-dot {
  width: 28px; height: 28px;
  border-radius: 50%;
  border: 2px solid var(--border);
  background: var(--card);
  color: var(--muted);
  font-size: 0.72rem;
  font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: all 0.2s;
  font-family: 'JetBrains Mono', monospace;
}
.step-dot:hover { border-color: var(--accent); color: var(--accent); }
.step-dot.active { background: var(--accent); border-color: var(--accent); color: white; }
.step-dot.done { background: var(--green); border-color: var(--green); color: #0a1a12; }

/* ===================================================
   LAYOUT PRINCIPAL
=================================================== */
.app-layout {
  max-width: 1400px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: 260px 1fr;
  min-height: calc(100vh - 60px);
}

/* ===================================================
   SIDEBAR
=================================================== */
.sidebar {
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 1.5rem 0;
  position: sticky;
  top: 60px;
  height: calc(100vh - 60px);
  overflow-y: auto;
}
.sidebar-title {
  font-size: 0.68rem;
  font-family: 'JetBrains Mono', monospace;
  color: var(--muted);
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 0 1.25rem 0.75rem;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0.6rem 1.25rem;
  cursor: pointer;
  font-size: 0.88rem;
  color: var(--muted);
  border-left: 3px solid transparent;
  transition: all 0.15s;
  position: relative;
}
.nav-item:hover { background: rgba(108,143,245,0.06); color: var(--text); }
.nav-item.active {
  background: rgba(108,143,245,0.1);
  color: var(--accent);
  border-left-color: var(--accent);
  font-weight: 600;
}
.nav-item.done { color: var(--green); }
.nav-item.done::after {
  content: '✓';
  position: absolute;
  right: 1rem;
  font-size: 0.75rem;
  color: var(--green);
}
.nav-num {
  width: 22px; height: 22px;
  border-radius: 50%;
  background: var(--card);
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.68rem;
  font-family: 'JetBrains Mono', monospace;
  flex-shrink: 0;
}
.nav-sep {
  height: 1px;
  background: var(--border);
  margin: 0.75rem 1.25rem;
}
.nav-section-label {
  font-size: 0.65rem;
  font-family: 'JetBrains Mono', monospace;
  color: var(--orange);
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 0.75rem 1.25rem 0.25rem;
}

/* ===================================================
   MAIN CONTENT
=================================================== */
.main-content {
  padding: 0;
  overflow: hidden;
}

/* ===================================================
   STEP PAGE
=================================================== */
.step-page { display: none; }
.step-page.visible { display: block; }

/* ===================================================
   STEP HERO BANNER
=================================================== */
.step-banner {
  background: linear-gradient(135deg, var(--surface) 0%, var(--card) 100%);
  border-bottom: 1px solid var(--border);
  padding: 2rem 2.5rem;
  position: relative;
  overflow: hidden;
}
.step-banner::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--accent), var(--pink), var(--green));
}
.step-number-big {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.72rem;
  color: var(--orange);
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-bottom: 0.5rem;
}
.step-banner h1 {
  font-size: 1.7rem;
  font-weight: 800;
  margin-bottom: 0.6rem;
  line-height: 1.2;
}
.step-banner p {
  color: var(--muted);
  font-size: 0.95rem;
  max-width: 700px;
}
.step-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 1rem;
}
.tag {
  padding: 3px 10px;
  border-radius: 99px;
  font-size: 0.72rem;
  font-family: 'JetBrains Mono', monospace;
  border: 1px solid;
}
.tag-html { color: var(--html-col); border-color: rgba(227,108,78,0.3); background: rgba(227,108,78,0.08); }
.tag-css  { color: var(--css-col);  border-color: rgba(108,143,245,0.3); background: rgba(108,143,245,0.08); }
.tag-prop { color: var(--green);    border-color: rgba(76,214,160,0.3);   background: rgba(76,214,160,0.08); }

/* ===================================================
   SPLIT EDITOR
=================================================== */
.split-workspace {
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: auto 1fr;
  height: calc(100vh - 60px - 170px);
  min-height: 480px;
}
.panel-tabs {
  grid-column: 1;
  display: flex;
  background: var(--code-bg);
  border-bottom: 1px solid var(--border);
  border-right: 1px solid var(--border);
}
.preview-tabs {
  grid-column: 2;
  display: flex;
  background: var(--code-bg);
  border-bottom: 1px solid var(--border);
}
.ptab {
  padding: 8px 18px;
  font-size: 0.78rem;
  font-family: 'JetBrains Mono', monospace;
  color: var(--muted);
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.15s;
  user-select: none;
}
.ptab:hover { color: var(--text); }
.ptab.active-html { color: var(--html-col); border-color: var(--html-col); }
.ptab.active-css  { color: var(--css-col);  border-color: var(--css-col); }
.ptab.active-prev { color: var(--green);    border-color: var(--green); }
.ptab.active-expl { color: var(--orange);   border-color: var(--orange); }

.code-panel {
  background: var(--code-bg);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  display: none;
}
.code-panel.visible { display: block; }
.code-panel pre {
  padding: 1.5rem;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.8rem;
  line-height: 1.9;
  white-space: pre;
  min-height: 100%;
}
/* line numbers */
.code-panel pre .ln {
  color: var(--comment);
  user-select: none;
  margin-right: 1.5rem;
  display: inline-block;
  min-width: 2ch;
  text-align: right;
}

/* syntax colors */
.ht { color: var(--tag-col); }       /* html tag */
.ha { color: var(--attr-col); }      /* html attr */
.hv { color: var(--str-col); }       /* html value string */
.hc { color: var(--comment); }       /* html comment */
.cs { color: var(--sel-col); }       /* css selector */
.cp { color: var(--prop-col); }      /* css property */
.cv { color: var(--val-col); }       /* css value */
.cc { color: var(--comment); }       /* css comment */
.cb { color: var(--muted); }         /* css bracket */

/* ===================================================
   PREVIEW PANEL
=================================================== */
.preview-panel, .explain-panel {
  display: none;
  overflow-y: auto;
  height: 100%;
}
.preview-panel.visible { display: block; }
.explain-panel.visible { display: block; }
.preview-frame-wrap {
  width: 100%;
  height: 100%;
  background: white;
}
.preview-frame-wrap iframe {
  width: 100%;
  height: 100%;
  border: none;
  display: block;
}

/* ===================================================
   EXPLAIN PANEL
=================================================== */
.explain-panel {
  background: var(--surface);
  padding: 1.5rem;
}
.explain-panel h3 {
  font-size: 1rem;
  font-weight: 700;
  margin-bottom: 1.25rem;
  color: var(--orange);
  display: flex;
  align-items: center;
  gap: 8px;
}
.prop-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem 1.25rem;
  margin-bottom: 0.75rem;
}
.prop-card-name {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.82rem;
  color: var(--prop-col);
  font-weight: 700;
  margin-bottom: 0.4rem;
}
.prop-card-desc {
  font-size: 0.85rem;
  color: var(--muted);
  line-height: 1.6;
  margin-bottom: 0.5rem;
}
.prop-card-example {
  background: var(--code-bg);
  border-radius: 6px;
  padding: 8px 12px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.75rem;
  color: var(--val-col);
  border-left: 3px solid var(--css-col);
}
.explain-note {
  background: rgba(245,166,35,0.08);
  border: 1px solid rgba(245,166,35,0.25);
  border-radius: 8px;
  padding: 0.75rem 1rem;
  font-size: 0.83rem;
  color: var(--orange);
  margin-bottom: 0.75rem;
  line-height: 1.6;
}
.explain-note strong { color: var(--yellow); }
.explain-tip {
  background: rgba(76,214,160,0.07);
  border: 1px solid rgba(76,214,160,0.2);
  border-radius: 8px;
  padding: 0.75rem 1rem;
  font-size: 0.83rem;
  color: var(--green);
  margin-bottom: 0.75rem;
  line-height: 1.6;
}

/* ===================================================
   BOTTOM BAR
=================================================== */
.bottom-bar {
  border-top: 1px solid var(--border);
  background: var(--surface);
  padding: 0.75rem 1.5rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
  flex-wrap: wrap;
}
.step-info-txt {
  font-size: 0.8rem;
  color: var(--muted);
  font-family: 'JetBrains Mono', monospace;
}
.nav-btns {
  display: flex;
  gap: 0.5rem;
}
.btn {
  padding: 7px 18px;
  border-radius: 7px;
  font-family: 'Outfit', sans-serif;
  font-size: 0.83rem;
  font-weight: 600;
  cursor: pointer;
  border: none;
  transition: all 0.18s;
}
.btn-prev { background: var(--card); color: var(--muted); border: 1px solid var(--border); }
.btn-prev:hover { color: var(--text); border-color: var(--muted); }
.btn-next { background: var(--accent); color: white; }
.btn-next:hover { background: #5a7ee8; transform: translateY(-1px); }

/* ===================================================
   RESPONSIVE
=================================================== */
@media (max-width: 900px) {
  .app-layout { grid-template-columns: 1fr; }
  .sidebar { display: none; }
  .split-workspace { grid-template-columns: 1fr; height: auto; }
  .panel-tabs, .preview-tabs { grid-column: 1; }
  .code-panel { min-height: 280px; border-right: none; }
}
</style>
</head>
<body>

<!-- ===================================================
     HEADER
=================================================== -->
<header class="site-header">
  <div class="header-inner">
    <div class="logo-text">CSS<span>.</span>learn</div>
    <div class="header-steps" id="header-dots"></div>
  </div>
</header>

<!-- ===================================================
     LAYOUT
=================================================== -->
<div class="app-layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-title">Sommaire du cours</div>

    <div class="nav-section-label">Fondations</div>
    <div class="nav-item active" onclick="goTo(0)" id="nav0"><span class="nav-num">1</span>Structure HTML de base</div>
    <div class="nav-item" onclick="goTo(1)" id="nav1"><span class="nav-num">2</span>Couleurs & Texte</div>
    <div class="nav-item" onclick="goTo(2)" id="nav2"><span class="nav-num">3</span>Marges & Espacements</div>
    <div class="nav-item" onclick="goTo(3)" id="nav3"><span class="nav-num">4</span>Bordures & Fond</div>

    <div class="nav-sep"></div>
    <div class="nav-section-label">Mise en page</div>
    <div class="nav-item" onclick="goTo(4)" id="nav4"><span class="nav-num">5</span>Barre de navigation</div>
    <div class="nav-item" onclick="goTo(5)" id="nav5"><span class="nav-num">6</span>Section Hero</div>
    <div class="nav-item" onclick="goTo(6)" id="nav6"><span class="nav-num">7</span>Colonnes avec float</div>

    <div class="nav-item" onclick="goTo(8)" id="nav8"><span class="nav-num">9</span>Liens & États hover</div>

  <main class="main-content" id="main-content"></main>

<script>
/* ===========================================================
   DONNÉES DES ÉTAPES
=========================================================== */
const steps = [

/* ── STEP 0 ── Structure HTML de base */
{
  title: "Structure HTML de base",
  subtitle: "On commence par les fondations : la structure d'une page HTML. Sans HTML solide, le CSS ne sert à rien !",
  num: "ÉTAPE 1 / 10",
  tags: ["html", "doctype", "head", "body"],
  html: `<span class="hc">&lt;!-- Structure de base d'une page HTML --&gt;</span>
<span class="ht">&lt;!DOCTYPE html&gt;</span>
<span class="ht">&lt;html</span> <span class="ha">lang</span>=<span class="hv">"fr"</span><span class="ht">&gt;</span>

  <span class="ht">&lt;head&gt;</span>
    <span class="hc">&lt;!-- Encodage des caractères --&gt;</span>
    <span class="ht">&lt;meta</span> <span class="ha">charset</span>=<span class="hv">"UTF-8"</span><span class="ht">&gt;</span>

    <span class="hc">&lt;!-- Adapte la page aux mobiles --&gt;</span>
    <span class="ht">&lt;meta</span> <span class="ha">name</span>=<span class="hv">"viewport"</span>
          <span class="ha">content</span>=<span class="hv">"width=device-width, initial-scale=1.0"</span><span class="ht">&gt;</span>

    <span class="hc">&lt;!-- Titre affiché dans l'onglet --&gt;</span>

    <span class="hc">&lt;!-- Lien vers le fichier CSS --&gt;</span>
    <span class="ht">&lt;link</span> <span class="ha">rel</span>=<span class="hv">"stylesheet"</span> <span class="ha">href</span>=<span class="hv">"style.css"</span><span class="ht">&gt;</span>
  <span class="ht">&lt;/head&gt;</span>

  <span class="ht">&lt;body&gt;</span>
    <span class="hc">&lt;!-- Tout le contenu visible va ici --&gt;</span>
    <span class="ht">&lt;h1&gt;</span>Bienvenue sur mon site !<span class="ht">&lt;/h1&gt;</span>
    <span class="ht">&lt;p&gt;</span>Voici mon premier paragraphe.<span class="ht">&lt;/p&gt;</span>
  <span class="ht">&lt;/body&gt;</span>

<span class="ht">&lt;/html&gt;</span>`,
  css: `<span class="cc">/* style.css — vide pour l'instant */</span>
<span class="cc">/* On va remplir ce fichier étape par étape ! */</span>`,
  preview: `<h1>Bienvenue sur mon site !</h1><p>Voici mon premier paragraphe.</p>`,
  previewCSS: `body { font-family: Georgia, serif; padding: 20px; }`,
  explain: [
    { name: "<!DOCTYPE html>", desc: "Déclare que c'est un document HTML5. Toujours la première ligne d'une page web.", ex: "<!DOCTYPE html>" },
    { name: "<html lang='fr'>", desc: "La balise racine qui contient tout. L'attribut lang aide les lecteurs d'écran et les moteurs de recherche.", ex: '<html lang="fr">' },
    { name: "<head>", desc: "Contient les informations sur la page (titre, liens CSS, encodage). Ces infos ne s'affichent PAS dans le navigateur.", ex: "<head>\n  ...\n</head>" },
    { name: "<meta charset='UTF-8'>", desc: "Définit l'encodage : permet d'afficher les accents, lettres spéciales (é, à, ç...). TOUJOURS inclure !", ex: '<meta charset="UTF-8">' },
    { name: "<link rel='stylesheet'>", desc: "Connecte le fichier CSS à ta page HTML. Sans ça, ton CSS n'est pas chargé !", ex: '<link rel="stylesheet" href="style.css">' },
    { name: "<body>", desc: "Contient tout le contenu visible : textes, images, boutons, etc. Tout ce que l'utilisateur voit est dans le body.", ex: "<body>\n  <h1>Mon titre</h1>\n</body>" },
  ],
  note: "💡 <strong>À retenir :</strong> HTML = le squelette (structure), CSS = la peau et les vêtements (style). Sans HTML, pas de CSS possible !",
},

/* ── STEP 1 ── Couleurs & Texte */
{
  title: "Couleurs & Typographie",
  subtitle: "On stylise le texte : couleurs, polices, tailles, alignement. Les premières propriétés CSS à connaître.",
  num: "ÉTAPE 2 / 10",
  tags: ["color", "font-size", "font-family", "text-align", "font-weight"],

<span class="cb">}</span>

<span class="cc">/* ── Titre principal h1 ── */</span>
<span class="cs">h1</span> <span class="cb">{</span>

  <span class="cp">text-align</span>: <span class="cv">center</span>;
  <span class="cp">font-weight</span>: <span class="cv">bold</span>;
  <span class="cp">text-transform</span>: <span class="cv">uppercase</span>;
  <span class="cp">letter-spacing</span>: <span class="cv">3px</span>;
<span class="cb">}</span>

<span class="cc">/* ── Sous-titre h2 ── */</span>
<span class="cs">h2</span> <span class="cb">{</span>
  <span class="cp">font-size</span>: <span class="cv">24px</span>;
  <span class="cp">color</span>: <span class="cv">#283593</span>;

<span class="cb">}</span>

<span class="cc">/* ── Paragraphe normal ── */</span>
<span class="cs">p</span> <span class="cb">{</span>

<span class="cb">}</span>

<span class="cc">/* ── Classe spéciale ── */</span>
<span class="cs">.important</span> <span class="cb">{</span>
  <span class="cp">color</span>: <span class="cv">#c62828</span>;
  <span class="cp">font-weight</span>: <span class="cv">bold</span>;
  <span class="cp">font-size</span>: <span class="cv">18px</span>;
<span class="cb">}</span>`,

  previewCSS: `*{box-sizing:border-box;margin:0;padding:0;}body{font-family:Arial,sans-serif;}.navbar{background:#1a237e;height:65px;padding:0 40px;overflow:hidden;}#logo{float:left;color:white;font-size:22px;font-weight:bold;line-height:65px;}#nav-liens{float:right;list-style:none;line-height:65px;}#nav-liens li{display:inline-block;}#nav-liens a{color:#b3c5ff;text-decoration:none;padding:0 15px;transition:color .2s;}#nav-liens a:hover{color:white;}.hero{height:380px;background-image:url('https://picsum.photos/1200/400?random=42');background-size:cover;background-position:center;position:relative;}.hero::before{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);}.hero-contenu{position:relative;text-align:center;padding-top:90px;color:white;}.hero-contenu h1{font-size:40px;margin-bottom:15px;}.hero-contenu p{font-size:18px;margin-bottom:25px;}.btn-hero{display:inline-block;padding:13px 35px;background:#ff6f00;color:white;text-decoration:none;border-radius:5px;font-size:16px;transition:background .2s;}.btn-hero:hover{background:#e65100;}.services{padding:50px 40px;background:#f5f5f5;}.services h2{text-align:center;color:#1a237e;margin-bottom:30px;font-size:28px;}.rangee{max-width:900px;margin:0 auto;overflow:hidden;}.col{float:left;width:33.33%;padding:25px 20px;text-align:center;background:white;border:1px solid #e0e0e0;transition:box-shadow .2s;}.col:hover{box-shadow:0 5px 20px rgba(0,0,0,0.1);}.footer{background:#111827;color:#6b7280;text-align:center;padding:20px;font-size:14px;border-top:3px solid #1a237e;}`,
  explain: [
    { name: "* { box-sizing: border-box }", desc: "Reset universel : applique box-sizing à TOUS les éléments. C'est la première chose à écrire dans tout projet CSS moderne.", ex: "* {\n  box-sizing: border-box;\n  margin: 0;\n  padding: 0;\n}" },
    { name: "Récapitulatif float", desc: "Logo → float:left | Liens → float:right | Conteneur → overflow:hidden | Colonnes → float:left + width:33.33%", ex: "/* Pattern colonnes */\n.conteneur { overflow: hidden; }\n.colonne { float: left; width: 33.33%; }" },
    { name: "Récapitulatif background", desc: "background-image + background-size:cover + background-position:center = section hero parfaite.", ex: ".hero {\n  background-image: url(...);\n  background-size: cover;\n  background-position: center;\n}" },
    { name: "Récapitulatif hover", desc: ":hover sur les liens + transition sur l'élément de base = interactions fluides.", ex: ".lien { transition: color 0.2s; }\n.lien:hover { color: orange; }" },
  ],
  note: "🏆 <strong>Félicitations !</strong> Tu as maîtrisé les fondamentaux du CSS sans Flexbox. La prochaine étape : apprendre Flexbox qui rend tout ça encore plus simple !",

/* ===========================================================
   RENDU DES ÉTAPES
=========================================================== */
let currentStep = 0;

function renderStep(i) {
  const s = steps[i];
  const main = document.getElementById('main-content');

  const htmlId = `step-html-${i}`;
  const cssId  = `step-css-${i}`;
  const prevId = `step-prev-${i}`;
  const explId = `step-expl-${i}`;

  let propsHtml = '';
  (s.explain || []).forEach(p => {
    propsHtml += `
      <div class="prop-card">
        <div class="prop-card-name">${p.name}</div>
        <div class="prop-card-desc">${p.desc}</div>
        <div class="prop-card-example">${p.ex.replace(/\n/g,'<br>')}</div>
      </div>`;
  });

  const noteHtml = s.note ? `<div class="explain-note">${s.note}</div>` : '';
  const tipHtml  = s.tip  ? `<div class="explain-tip">✅ ${s.tip.replace('✅ ','')}</div>` : '';

  let tagsHtml = '';
  (s.tags || []).forEach(t => {
    const cls = t.startsWith('font')||t.startsWith('color')||t.startsWith('text')||t.startsWith('background')||t.startsWith('border')||t.startsWith('margin')||t.startsWith('padding')||t.startsWith('width')||t.startsWith('height')||t.startsWith('list')||t.startsWith('display')||t.startsWith('float')||t.startsWith('overflow')||t.startsWith('box')||t.startsWith('position')||t.startsWith('transition')||t.startsWith('transform')||t.startsWith('cursor')||t.startsWith(':') ? 'tag-css' : t==='html'||t==='head'||t==='body'||t==='doctype'||t==='navbar'||t==='hero'||t==='services'||t==='footer' ? 'tag-html' : 'tag-prop';
    tagsHtml += `<span class="tag ${cls}">${t}</span>`;
  });

  const page = document.createElement('div');
  page.className = 'step-page' + (i === 0 ? ' visible' : '');
  page.id = `step-${i}`;
  page.innerHTML = `
    <div class="step-banner">
      <div class="step-number-big">${s.num}</div>
      <h1>${s.title}</h1>
      <p>${s.subtitle}</p>
      <div class="step-tags">${tagsHtml}</div>
    </div>

    <div class="split-workspace">
      <!-- tabs gauche -->
      <div class="panel-tabs">
        <div class="ptab active-html" id="tab-html-${i}" onclick="switchPanel(${i},'html')">index.html</div>
        <div class="ptab" id="tab-css-${i}" onclick="switchPanel(${i},'css')">style.css</div>
      </div>
      <!-- tabs droite -->
      <div class="preview-tabs">
        <div class="ptab active-prev" id="tab-prev-${i}" onclick="switchRight(${i},'prev')">▶ Rendu</div>
        <div class="ptab" id="tab-expl-${i}" onclick="switchRight(${i},'expl')">📖 Explications</div>
      </div>

      <!-- panel HTML -->
      <div class="code-panel visible" id="${htmlId}">
        <pre>${s.html}</pre>
      </div>
      <!-- panel CSS -->
      <div class="code-panel" id="${cssId}">
        <pre>${s.css}</pre>
      </div>
      <!-- preview -->
      <div class="preview-panel visible" id="${prevId}">
        <div class="preview-frame-wrap">
          <iframe id="iframe-${i}" srcdoc=""></iframe>
        </div>
      </div>
      <!-- explanations -->
      <div class="explain-panel" id="${explId}">
        <h3>📖 Propriétés expliquées</h3>
        ${noteHtml}
        ${tipHtml}
        ${propsHtml}
      </div>
    </div>

    <div class="bottom-bar">
      <span class="step-info-txt">${s.num} — ${s.title}</span>
      <div class="nav-btns">
        ${i > 0 ? `<button class="btn btn-prev" onclick="goTo(${i-1})">← Précédent</button>` : ''}
        ${i < steps.length-1 ? `<button class="btn btn-next" onclick="goTo(${i+1})">Suivant →</button>` : '<button class="btn btn-next" style="background:var(--green);color:#0a1a0a">🏆 Terminé !</button>'}
      </div>
    </div>
  `;

  main.appendChild(page);

  // inject iframe
  setTimeout(() => {
    const iframe = document.getElementById(`iframe-${i}`);
    if (iframe) {
      iframe.srcdoc = `<!DOCTYPE html><html><head><style>${s.previewCSS}</style></head><body>${s.preview}</body></html>`;
    }
  }, 80);
}

/* Render all steps */
steps.forEach((_, i) => renderStep(i));

/* Build header dots */
const dotsContainer = document.getElementById('header-dots');
steps.forEach((s, i) => {
  const d = document.createElement('div');
  d.className = 'step-dot' + (i === 0 ? ' active' : '');
  d.textContent = i + 1;
  d.title = s.title;
  d.onclick = () => goTo(i);
  d.id = `dot-${i}`;
  dotsContainer.appendChild(d);
});

/* ===========================================================
   NAVIGATION
=========================================================== */
function goTo(i) {
  // hide current, mark done
  document.getElementById(`step-${currentStep}`).classList.remove('visible');
  document.getElementById(`dot-${currentStep}`).classList.remove('active');
  document.getElementById(`dot-${currentStep}`).classList.add('done');
  document.getElementById(`nav${currentStep}`).classList.remove('active');
  document.getElementById(`nav${currentStep}`).classList.add('done');

  // show new
  currentStep = i;
  document.getElementById(`step-${i}`).classList.add('visible');
  document.getElementById(`dot-${i}`).classList.remove('done');
  document.getElementById(`dot-${i}`).classList.add('active');
  document.getElementById(`nav${i}`).classList.remove('done');
  document.getElementById(`nav${i}`).classList.add('active');

  // scroll top
  document.getElementById('main-content').scrollTop = 0;
  window.scrollTo(0,0);
}

/* ===========================================================
   PANEL SWITCHES
=========================================================== */
function switchPanel(i, which) {
  document.getElementById(`step-html-${i}`).classList.remove('visible');
  document.getElementById(`step-css-${i}`).classList.remove('visible');
  document.getElementById(`tab-html-${i}`).className = 'ptab';
  document.getElementById(`tab-css-${i}`).className = 'ptab';

  if (which === 'html') {
    document.getElementById(`step-html-${i}`).classList.add('visible');
    document.getElementById(`tab-html-${i}`).className = 'ptab active-html';
  } else {
    document.getElementById(`step-css-${i}`).classList.add('visible');
    document.getElementById(`tab-css-${i}`).className = 'ptab active-css';
  }
}

function switchRight(i, which) {
  document.getElementById(`step-prev-${i}`).classList.remove('visible');
  document.getElementById(`step-expl-${i}`).classList.remove('visible');
  document.getElementById(`tab-prev-${i}`).className = 'ptab';
  document.getElementById(`tab-expl-${i}`).className = 'ptab';

  if (which === 'prev') {
    document.getElementById(`step-prev-${i}`).classList.add('visible');
    document.getElementById(`tab-prev-${i}`).className = 'ptab active-prev';
  } else {
    document.getElementById(`step-expl-${i}`).classList.add('visible');
    document.getElementById(`tab-expl-${i}`).className = 'ptab active-expl';
  }
}
</script>
</body>
</html>
